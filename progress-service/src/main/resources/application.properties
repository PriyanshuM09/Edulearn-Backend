spring.config.import=optional:file:../.env[.properties]

server.port=8087
spring.application.name=progress-service

spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/edulearn_progress?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

eureka.client.service-url.defaultZone=${EUREKA_URL:http://localhost:8761/eureka/}
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
eureka.instance.prefer-ip-address=true

management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always

# Certificate PDF storage path
file.upload.dir=uploads
file.base.url=http://localhost:8087/files

# Direct service URLs (bypasses Eureka — used for certificate name lookups)
services.auth.base-url=http://auth-service:8081
services.course-base-url=http://course-service:8082

# SQL Initialization
spring.sql.init.mode=always
spring.jpa.hibernate.ddl-auto=none