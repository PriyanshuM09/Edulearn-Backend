# Test properties to avoid external dependencies during context startup
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop

spring.data.redis.host=localhost
spring.data.redis.port=6379

eureka.client.enabled=false
spring.cloud.discovery.enabled=false

jwt.secret=mySecretKeyMySecretKeyMySecretKeyMySecretKeyMySecretKeyMySecretKey
jwt.expiration=3600000
app.frontend.url=http://localhost:3000
app.reset.token.expiry.minutes=30
google.client.id=mock-id

spring.mail.host=localhost
spring.mail.port=25
spring.mail.username=test
spring.mail.password=test
