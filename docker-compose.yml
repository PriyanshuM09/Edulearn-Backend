      EUREKA_URL: http://eureka-server:8761/eureka/
      SERVICES_AUTH_BASE_URL: http://auth-service:8081
      SERVICES_COURSE_BASE_URL: http://course-service:8082
      EUREKA_INSTANCE_PREFER_IP_ADDRESS: "true"
