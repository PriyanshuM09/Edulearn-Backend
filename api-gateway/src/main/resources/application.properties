spring.config.import=optional:file:../.env[.properties]

server.port=8080
spring.application.name=api-gateway

# ── Eureka ──────────────────────────────────────────────────────────────────
eureka.client.service-url.defaultZone=${EUREKA_URL:http://localhost:8761/eureka/}
eureka.instance.prefer-ip-address=true

# ── JWT Secret — must match auth-service exactly ────────────────────────────
jwt.secret=${JWT_SECRET}

# ══════════════════════════════════════════════════════════════════════════════
# ROUTES
# ══════════════════════════════════════════════════════════════════════════════

# ── Route 1: Auth Service ────────────────────────────────────────────────────
spring.cloud.gateway.routes[0].id=auth-service
spring.cloud.gateway.routes[0].uri=lb://auth-service
spring.cloud.gateway.routes[0].predicates[0]=Path=/api/v1/auth/**

# ── Route 2: Course Service ──────────────────────────────────────────────────
spring.cloud.gateway.routes[1].id=course-service
spring.cloud.gateway.routes[1].uri=lb://course-service
spring.cloud.gateway.routes[1].predicates[0]=Path=/api/v1/courses/**

# ── Route 3: Lesson Service ──────────────────────────────────────────────────
spring.cloud.gateway.routes[2].id=lesson-service
spring.cloud.gateway.routes[2].uri=lb://lesson-service
spring.cloud.gateway.routes[2].predicates[0]=Path=/api/v1/lessons/**

# ── Route 4: Enrollment Service ─────────────────────────────────────────────
spring.cloud.gateway.routes[3].id=enrollment-service
spring.cloud.gateway.routes[3].uri=lb://enrollment-service
spring.cloud.gateway.routes[3].predicates[0]=Path=/api/v1/enrollments/**

# ── Route 5: Assessment Service — Quizzes ───────────────────────────────────
spring.cloud.gateway.routes[4].id=assessment-service-quizzes
spring.cloud.gateway.routes[4].uri=lb://assessment-service
spring.cloud.gateway.routes[4].predicates[0]=Path=/api/v1/quizzes/**

# ── Route 6: Assessment Service — Attempts ──────────────────────────────────
spring.cloud.gateway.routes[5].id=assessment-service-attempts
spring.cloud.gateway.routes[5].uri=lb://assessment-service
spring.cloud.gateway.routes[5].predicates[0]=Path=/api/v1/attempts/**

# ── Route 7: Payment Service ─────────────────────────────────────────────────
spring.cloud.gateway.routes[6].id=payment-service
spring.cloud.gateway.routes[6].uri=lb://payment-service
spring.cloud.gateway.routes[6].predicates[0]=Path=/api/v1/payments/**

# ── Route 8: Questions (Assessment Service) ───────────────────────────
spring.cloud.gateway.routes[7].id=assessment-service-questions
spring.cloud.gateway.routes[7].uri=lb://assessment-service
spring.cloud.gateway.routes[7].predicates[0]=Path=/api/v1/questions/**

# ── Route 9: Discussion Service ──────────────────────────────────────────────
spring.cloud.gateway.routes[8].id=discussion-service
spring.cloud.gateway.routes[8].uri=lb://discussion-service
spring.cloud.gateway.routes[8].predicates[0]=Path=/api/v1/discussions/**

# ── Route 10: Notification Service ───────────────────────────────────────────
spring.cloud.gateway.routes[9].id=notification-service
spring.cloud.gateway.routes[9].uri=lb://notification-service
spring.cloud.gateway.routes[9].predicates[0]=Path=/api/v1/notifications/**

# ── Route 11: Progress Service ──────────────────────────────────────────────
spring.cloud.gateway.routes[10].id=progress-service
spring.cloud.gateway.routes[10].uri=lb://progress-service
spring.cloud.gateway.routes[10].predicates[0]=Path=/api/v1/progress/**

# ══════════════════════════════════════════════════════════════════════════════
# CORS
# ══════════════════════════════════════════════════════════════════════════════
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowed-origins[0]=http://localhost:3000
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowed-origins[1]=http://127.0.0.1:3000
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowed-origins[2]=http://localhost:8090
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowed-methods[0]=GET
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowed-methods[1]=POST
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowed-methods[2]=PUT
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowed-methods[3]=DELETE
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowed-methods[4]=OPTIONS
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowed-headers[0]=*
spring.cloud.gateway.globalcors.cors-configurations.[/**].allow-credentials=true

# ══════════════════════════════════════════════════════════════════════════════
# ACTUATOR
# ══════════════════════════════════════════════════════════════════════════════
management.endpoints.web.exposure.include=health,info,metrics,gateway
management.endpoint.health.show-details=always
management.endpoint.gateway.enabled=true

# ══════════════════════════════════════════════════════════════════════════════
# SWAGGER AGGREGATION
# ══════════════════════════════════════════════════════════════════════════════
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.urls[0].name=Auth Service
springdoc.swagger-ui.urls[0].url=/v3/api-docs/auth-service
springdoc.swagger-ui.urls[1].name=Course Service
springdoc.swagger-ui.urls[1].url=/v3/api-docs/course-service
springdoc.swagger-ui.urls[2].name=Lesson Service
springdoc.swagger-ui.urls[2].url=/v3/api-docs/lesson-service
springdoc.swagger-ui.urls[3].name=Enrollment Service
springdoc.swagger-ui.urls[3].url=/v3/api-docs/enrollment-service
springdoc.swagger-ui.urls[4].name=Assessment Service
springdoc.swagger-ui.urls[4].url=/v3/api-docs/assessment-service
springdoc.swagger-ui.urls[5].name=Payment Service
springdoc.swagger-ui.urls[5].url=/v3/api-docs/payment-service
springdoc.swagger-ui.urls[6].name=Progress Service
springdoc.swagger-ui.urls[6].url=/v3/api-docs/progress-service
springdoc.swagger-ui.urls[7].name=Discussion Service
springdoc.swagger-ui.urls[7].url=/v3/api-docs/discussion-service
springdoc.swagger-ui.urls[8].name=Notification Service
springdoc.swagger-ui.urls[8].url=/v3/api-docs/notification-service

# Routes for OpenAPI Docs
